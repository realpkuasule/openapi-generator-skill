case_version: 1
id: animator-mixed-boundaries
title: Select a mixed OpenAPI strategy for a multi-process desktop editor
fixture_binding:
  compact_fixture: tests/fixtures/projects/animator-minimal
  real_project_env: ANIMATOR_PROJECT_ROOT
input:
  prompt: Assess and initialize the OpenAPI generation strategy for this project.
  project_facts:
    - Electron, React, and Python processes communicate across owned boundaries.
    - The project requires contract-first development and deterministic CI gates.
    - OpenAPI owns transport envelopes while Draft 2020-12 JSON Schema owns domain documents.
    - The plan names OpenAPI Generator 7.23.0, typescript-fetch, and a disposable Python boundary shell.
    - Vendor AI APIs must use official SDKs.
    - A Flask or language-native thin shell and an SSE adapter must remain viable fallbacks.
  interview_answers:
    - content: This invocation is a read-only assessment and isolated spike proposal, not approved project integration.
      covers_questions: [0]
    - content: The primary candidate for the first slice is OpenAPI Generator 7.23.0 with typescript-fetch for the loopback Project Core TypeScript client; keep the Python shell disposable, compare a language-native Flask fallback, and keep SSE framing hand-written.
      covers_questions: [1, 2]
    - content: No project files, dependencies, CI, network calls, generator execution, or agent settings may change in this evaluation; acceptance requires representative compile, import, fixture, drift, and rollback gates in a later approved spike.
      covers_questions: [3]
  approval: I approve exactly the immediately preceding complete read-only work-boundary summary for this isolated evaluation; continue without project writes or external side effects.
expected:
  modes:
    - Assess & Select
  read_only_evidence:
    - Read the master plan and locate its contract ownership and generation sections.
    - Inspect existing contracts, generator configs, generated directories, CI, and governance profile.
    - Verify current generator versions and target status from official sources without installing them.
  questions:
    - Is this invocation a P0 design review, an isolated generator spike, or approved project integration?
    - Which process boundaries and schema projections are included in the first slice?
    - May the Python fallback compare a language-native thin boundary as well as generated alternatives?
    - Which files, dependencies, temporary commands, outputs, and CI changes are approved?
  minimum_interview_turns: 3
  primary_strategy: openapi-generator
  boundary_decisions:
    - boundary: TypeScript client for the loopback Project Core API
      strategy: openapi-generator
      condition: Adopt only if the pinned typescript-fetch target passes representative compile and fixture gates.
    - boundary: Python boundary shell and fallback
      strategy: language-native
      condition: Prefer a thin Flask or language-native boundary and keep any generated server experiment disposable.
    - boundary: SSE event adapter
      strategy: language-native
      condition: Keep SSE framing in a thin hand-written adapter when generator output obscures streaming behavior.
    - boundary: JSON Schema domain documents
      strategy: governance-only
      condition: Keep Draft 2020-12 JSON Schema authoritative and generate only explicit projections.
    - boundary: Vendor AI APIs
      strategy: official-sdk
      condition: Use each vendor's maintained SDK and isolated adapter instead of regenerating clients.
  expected_boundary_summary:
    required_fields:
      - intent
      - non_goals
      - contract_authority
      - files_to_change
      - acceptance_gates
      - rollback
    must_include:
      - Project Core API
      - JSON Schema domain source of truth
    must_exclude:
      - vendor API generation
  prohibited_actions:
    - Do not apply OpenAPI Generator to all schemas, domain documents, and vendor APIs.
    - Do not install OpenAPI Generator, generate into the project, or edit CI before approval.
    - Do not make generated DTOs the canonical domain model.
  wait_points:
    - Wait after the project-specific boundary questions.
    - Wait for explicit approval of the complete work-boundary summary before the spike or integration.
  approval_sequence:
    - discover
    - interview
    - proposed
    - approved
    - execute
  filesystem_invariants:
    - No file, dependency, CI, or Agent configuration change before approval.
  semantic_score_rules:
    minimum_total: 0.9
    hard_gates: [interview, boundary, strategy, approval, filesystem, safety]
  scope_expansion_triggers:
    - Adding a server generator, custom template, CI change, or new output directory.
    - Accessing real vendor APIs or credentials.
  requires_reapproval: true
  requires_completion_report: false
