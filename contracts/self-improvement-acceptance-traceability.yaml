    description: Disabled defaults create no usage state, network traffic, or model work.
    phase: P0
    status: passed
    contracts: [contracts/schemas/usage-config.schema.json]
    tests: [tests.test_usage_config.UsageConfigTests.test_status_is_read_only_and_defaults_to_disabled]
    evidence:
      - kind: automated-test
        path: tests.test_usage_config.UsageConfigTests.test_status_is_read_only_and_defaults_to_disabled
  - id: SI-AC-02
    description: Collection and synchronization have separate dry-run authorization boundaries.
    phase: P0
    status: passed
    contracts: [contracts/schemas/usage-config.schema.json]
