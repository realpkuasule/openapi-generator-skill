openapi: 3.1.0
info:
  title: OpenAPI Engineering Control Plane
  version: 1.1.0
  description: >-
    Platform-neutral contracts for helpers bundled with the openapi-engineering
    skill. Discovery, comparison, and proposal operations are read-only; the
    profile apply operation is explicitly approval-bound. The implementation is
    CLI based, and future HTTP or MCP adapters must preserve these semantics.
x-runtime: cli-only
x-server-status: no-http-server-ships-with-this-skill
tags:
  - name: Inspection
  - name: Governance
  - name: Generation
  - name: Evaluation
paths:
  /v1/inspections:
    post:
      operationId: inspectProject
      x-cli-command: python3 scripts/inspect_project.py --root <root>
      x-cli-arguments:
        root: --root
      x-cli-exit-codes:
        '0': inspection completed
        '2': invalid root or usage error
      tags: [Inspection]
      summary: Inspect a project without changing it
      description: >-
        Reads project metadata and reports contract, build, CI, generation, and
        governance signals. It performs no writes, network calls, installs, or
        service starts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionRequest'
      responses:
        '200':
          description: Inspection completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionResponse'
              examples:
                projectInspection:
                  externalValue: './examples/inspect-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/profile-validations:
    post:
      operationId: validateGovernanceProfile
      x-cli-command: python3 scripts/validate_profile.py <profile>
      x-cli-arguments:
        profile: positional profile file path; the adapter loads the document before validation
      x-cli-exit-codes:
        '0': profile is valid
        '1': profile is invalid
        '2': usage, dependency, schema, or load error
      tags: [Governance]
      summary: Validate a project governance profile
      description: >-
        Validates structure and safety rules without modifying the profile.
        Exit semantics for the CLI adapter are 0 for valid, 1 for invalid, and
        2 for usage or load errors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileValidationRequest'
      responses:
        '200':
          description: Validation completed; inspect the valid field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileValidationResponse'
              examples:
                invalidProfile:
                  externalValue: './examples/profile-validation-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/profile-state-comparisons:
    post:
      operationId: compareGovernanceProfileState
      x-cli-command: >-
        python3 scripts/profile_state.py <check|propose> --profile <profile>
        --inspection <inspection>
      x-cli-arguments:
        mode: first positional argument; check or propose
        profile: --profile
        inspection: --inspection
      x-cli-exit-codes:
        '0': comparison completed
        '1': profile conflicts with observed project state
        '2': usage, dependency, schema, or load error
      tags: [Governance]
      summary: Compare a governance profile with read-only project evidence
      description: >-
        Reports unchanged, changed, conflict, or unknown state. Propose mode may
        return an approval-bound candidate profile but never writes the project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileStateComparisonRequest'
      responses:
        '200':
          description: Profile comparison completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileStateComparisonResponse'
              examples:
                changedProfile:
                  externalValue: './examples/profile-state-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/profile-state-applications:
    post:
      operationId: applyGovernanceProfileProposal
      x-cli-command: >-
        python3 scripts/profile_state.py apply --profile <profile>
        --proposal <proposal> --approve <approval-digest>
      x-cli-arguments:
        profile: --profile
        proposal: --proposal
        approval_digest: --approve
      x-cli-exit-codes:
        '0': approved proposal applied atomically
        '1': proposal is stale or approval digest does not match
        '2': usage, dependency, schema, or load error
      tags: [Governance]
      summary: Apply an explicitly approved governance profile proposal
      description: >-
        Writes only the requested profile after validating the current profile,
        proposed profile, and exact approval digest. Historical permissions do
        not authorize this operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileStateApplyRequest'
      responses:
        '200':
          description: Approved proposal applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileStateApplyResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/generation-comparisons:
    post:
      operationId: compareGeneration
      x-cli-command: python3 scripts/compare_generation.py <baseline> <candidate>
      x-cli-arguments:
        baseline: first positional directory
        candidate: second positional directory
      x-cli-exit-codes:
        '0': comparison completed
        '2': invalid directory or usage error
      tags: [Generation]
      summary: Compare two generated output directories
      description: >-
        Computes stable path and SHA-256 differences. It never runs a generator
        and never writes either directory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerationComparisonRequest'
      responses:
        '200':
          description: Comparison completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationComparisonResponse'
              examples:
                generationDiff:
                  externalValue: './examples/generation-comparison-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/empirical-gates:
    post:
      operationId: runEmpiricalGeneratorGate
      x-cli-command: >-
        python3 scripts/run_empirical_gate.py --manifest <path> [--execute
        --approve <manifest-sha256>] [--report <path>]
      x-cli-arguments:
        manifest: --manifest; approved declarative manifest
        execute: --execute; omitted for the default proposed-only plan
        approval_digest: --approve; exact canonical manifest SHA-256
        report: --report; optional atomic report destination
      x-cli-exit-codes:
        '0': dry-run proposal emitted or every required empirical gate passed
        '1': a required command, diff, integrity, compile, or fixture gate failed
        '2': manifest, approval, digest, or execution prerequisite was blocked
      tags: [Generation]
      summary: Plan or run an approval-bound empirical generator gate
      description: >-
        Validates a declaration that pins the contract, baseline, generator
        artifact, version, commands, feature gaps, and official sources. The
        default is read-only planning. Execution requires the exact manifest
        digest, uses argv without a shell, generates only in a fresh temporary
        workspace, checks project and baseline integrity after every command,
        and reclaims the workspace before returning.
        Upgrade manifests additionally generate previous and candidate versions
        from the same copied contract, require the previous output to match the
        read-only accepted baseline, and reject every generated diff that lacks
        an exact path/state explanation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/empirical-gate.schema.json#/$defs/manifest'
            examples:
              pythonClientAdoption:
                externalValue: './examples/empirical-gate-request.json'
      responses:
        '200':
          description: Empirical plan or execution completed; inspect status and gates.
          content:
            application/json:
              schema:
                $ref: './schemas/empirical-gate.schema.json'
              examples:
                proposedGate:
                  externalValue: './examples/empirical-gate-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/evaluation-runs:
    post:
      operationId: runSkillEvaluation
      x-cli-command: >-
        python3 scripts/run_skill_evals.py --adapter <adapter> --case <case>
        --samples <samples> --timeout <seconds> --report <path> [--resume]
        [--retry-nonpassing]
      x-cli-arguments:
        adapter: --adapter; fake, codex, or claude
        case: repeatable --case
        samples: --samples
        timeout: --timeout
        report: --report
        resume: --resume; continue only from a digest- and plan-matched checkpoint
        retry-nonpassing: --retry-nonpassing; replace only failed or blocked result slots
      x-cli-exit-codes:
        '0': every requested sample passed semantic and safety gates
        '1': at least one requested sample failed
        '2': a platform, contract, or execution prerequisite was blocked
      tags: [Evaluation]
      summary: Run isolated deterministic or real-platform skill evaluations
      description: >-
        Copies the compact fixture to a temporary project, performs a real
        multi-turn boundary interview for Codex or Claude Code in read-only or
        plan mode, and records transcripts, semantic observations, CLI
        versions, and before/after file hashes. The runner atomically checkpoints
        after every completed sample. Resume is accepted only when adapter,
        evaluation plan, timeout, Skill digest, and harness digest still match.
        Eval expected values are never sent to the tested platform.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRunRequest'
      responses:
        '200':
          description: Evaluation samples completed; inspect each result status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRunResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/acceptance-traceability-checks:
    post:
      operationId: checkAcceptanceTraceability
      x-cli-command: >-
        python3 scripts/check_traceability.py --manifest <path> --report <path>
      x-cli-arguments:
        manifest: --manifest; AC-01 through AC-12 evidence bindings
        report: --report; atomic machine-verifiable result
      x-cli-exit-codes:
        '0': all twelve requirements have live passing machine evidence
        '1': one or more requirements are failed, stale, static-only, or incomplete
        '2': the manifest, schema, or a required evidence capability is blocked
      tags: [Governance]
      summary: Verify AC-01 through AC-12 against machine evidence
      description: >-
        Resolves every contract and test selector, validates report status and
        platform coverage, rejects blocked or static-only declarations, and
        produces an embedded Completion Report. Missing or unverified evidence
        can never be counted as passed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/acceptance-traceability.schema.json#/$defs/manifest'
      responses:
        '200':
          description: Traceability check completed; inspect requirement results.
          content:
            application/json:
              schema:
                $ref: './schemas/acceptance-traceability.schema.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/scope-snapshots:
    post:
      operationId: manageScopeSnapshot
      x-cli-command: >-
        python3 scripts/scope_snapshot.py <snapshot|restore> --root <root>
        --snapshot-dir <external-dir> [--path <relative-path>] [--approve <digest>]
      x-cli-arguments:
        operation: first positional argument; snapshot or restore
        root: --root; protected project root
        snapshot_dir: --snapshot-dir; must be outside the project root
        selected_paths: repeatable --path for snapshot
        approval_digest: --approve; exact snapshot manifest digest for restore
      x-cli-exit-codes:
        '0': external snapshot created or exact approved scope restored
        '1': restore approval or current evidence did not match
        '2': request, path, snapshot integrity, or schema prerequisite was blocked
      tags: [Governance]
      summary: Snapshot or restore an explicitly bounded project scope
      description: >-
        Creates a digest-bound baseline outside the project before approved work
        when Git rollback is unavailable. Restore validates every snapshot file
        before changing only the selected relative paths and requires the exact
        approval digest. Symlinks, traversal, and in-project snapshots are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/scope-snapshot.schema.json#/$defs/request'
      responses:
        '200':
          description: Snapshot or restore completed; inspect status and digest.
          content:
            application/json:
              schema:
                $ref: './schemas/scope-snapshot.schema.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/evaluation-report-aggregations:
    post:
      operationId: aggregateSkillEvaluations
      x-cli-command: >-
        python3 scripts/aggregate_forward_evals.py --codex-report <path>
        --claude-report <path> --minimum-samples <minimum_samples>
        --report <path>
      x-cli-arguments:
        codex-report: --codex-report; fresh Codex evaluation report
        claude-report: --claude-report; fresh Claude Code evaluation report
        minimum-samples: --minimum-samples; at least 2, defaults to 2
        report: --report; atomic combined report destination
      x-cli-exit-codes:
        '0': both platforms passed on one Skill digest and are semantically equivalent
        '1': a behavior, safety gate, or semantic strategy comparison failed
        '2': evidence is missing, structurally invalid, stale, or not comparable
      tags: [Evaluation]
      summary: Aggregate and compare fresh Codex and Claude Code evaluations
      description: >-
        Validates every per-sample result, requires at least two samples for each
        required case and platform, verifies identical immutable Skill and evaluation
        harness digests plus file hashes, and compares required boundary-strategy matrices by case while
        retaining primary-ranking differences as evidence. Equivalent reports may rank
        different selected boundaries when both rankings are covered by the same
        accepted matrix. A `language-native` hand-written adapter may refine a shared
        `no-codegen` application decision; every other matrix difference remains a
        failure. This operation only consumes existing reports; it never invokes either
        model platform.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationAggregationRequest'
      responses:
        '200':
          description: Aggregation completed; inspect status and reasons.
          content:
            application/json:
              schema:
                $ref: './schemas/forward-eval-report.schema.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
components:
  responses:
    InvalidRequest:
      description: The request could not be loaded or validated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequest:
              externalValue: './examples/error-response.json'
  schemas:
    InspectionRequest:
      type: object
      additionalProperties: false
      required: [root]
      properties:
        root:
          type: string
          minLength: 1
          description: Absolute or working-directory-relative project path.
    InspectionResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - root
        - project_signals
        - languages
        - build_systems
        - contract_files
        - schema_files
        - governance_profiles
        - ci_files
        - generation_signals
        - generated_directories
        - excluded_paths
        - warnings
        - truncated
        - scan_counts
        - evidence
      properties:
        status:
          const: ok
        root:
          type: string
        project_signals:
          type: array
          items: { type: string }
        languages:
          type: array
          items: { type: string }
        build_systems:
          type: array
          items: { type: string }
        contract_files:
          type: array
          items: { type: string }
        schema_files:
          type: array
          items: { type: string }
        governance_profiles:
          type: array
          items: { type: string }
        ci_files:
          type: array
          items: { type: string }
        generation_signals:
          type: array
          items: { type: string }
        generated_directories:
          type: array
          items: { type: string }
        excluded_paths:
          type: array
          items:
            $ref: '#/components/schemas/ExcludedPath'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/InspectionWarning'
        truncated:
          type: boolean
        scan_counts:
          type: object
          additionalProperties: false
          required: [files, directories]
          properties:
            files: { type: integer, minimum: 0 }
            directories: { type: integer, minimum: 0 }
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/Evidence'
    ProfileValidationRequest:
      type: object
      additionalProperties: false
      required: [profile]
      properties:
        profile:
          $ref: './schemas/governance-profile.schema.json'
    ProfileValidationResponse:
      type: object
      additionalProperties: false
      required: [status, valid, errors, warnings]
      properties:
        status:
          const: ok
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFinding'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFinding'
    ProfileStateComparisonRequest:
      type: object
      additionalProperties: false
      required: [mode, profile, inspection]
      properties:
        mode:
          enum: [check, propose]
        profile:
          $ref: './schemas/governance-profile.schema.json'
        inspection:
          $ref: '#/components/schemas/InspectionResponse'
    ProfileStateComparisonResponse:
      type: object
      additionalProperties: false
      required: [status, state, profile_sha256, changes, proposal, warnings]
      properties:
        status:
          const: ok
        state:
          enum: [unchanged, changed, conflict, unknown]
        profile_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        changes:
          type: array
          items:
            $ref: '#/components/schemas/ProfileStateChange'
        proposal:
          oneOf:
            - $ref: '#/components/schemas/ProfileStateProposal'
            - type: 'null'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFinding'
    ProfileStateChange:
      type: object
      additionalProperties: false
      required:
        - path
        - state
        - profile_value
        - observed_value
        - provenance
        - evidence_paths
      properties:
        path:
          type: string
          pattern: '^/'
        state:
          enum: [changed, conflict, unknown]
        profile_value: {}
        observed_value: {}
        provenance:
          enum: [observed, user-decided, inferred]
        evidence_paths:
          type: array
          items: { type: string }
    ProfileStateProposal:
      type: object
      additionalProperties: false
      required:
        - status
        - profile_sha256
        - proposed_profile_sha256
        - approval_digest
        - requires_approval
        - operations
        - proposed_profile
      properties:
        status:
          const: proposed
        profile_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        proposed_profile_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        approval_digest:
          type: string
          pattern: '^[a-f0-9]{64}$'
        requires_approval:
          const: true
        operations:
          type: array
          items:
            $ref: '#/components/schemas/ProfilePatchOperation'
        proposed_profile:
          $ref: './schemas/governance-profile.schema.json'
    ProfilePatchOperation:
      type: object
      additionalProperties: false
      required: [op, path, value]
      properties:
        op:
          enum: [add, replace, remove]
        path:
          type: string
          pattern: '^/'
        value: {}
    ProfileStateApplyRequest:
      type: object
      additionalProperties: false
      required: [profile_path, proposal, approval_digest]
      properties:
        profile_path:
          type: string
          minLength: 1
        proposal:
          $ref: '#/components/schemas/ProfileStateProposal'
        approval_digest:
          type: string
          pattern: '^[a-f0-9]{64}$'
    ProfileStateApplyResponse:
      type: object
      additionalProperties: false
      required: [status, applied, profile, profile_sha256]
      properties:
        status:
          const: ok
        applied:
          const: true
        profile:
          type: string
        profile_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
    GenerationComparisonRequest:
      type: object
      additionalProperties: false
      required: [baseline, candidate]
      properties:
        baseline:
          type: string
          minLength: 1
        candidate:
          type: string
          minLength: 1
    GenerationComparisonResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - baseline
        - candidate
        - baseline_tree_sha256
        - candidate_tree_sha256
        - summary
        - files
      properties:
        status:
          const: ok
        baseline:
          type: string
        candidate:
          type: string
        baseline_tree_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        candidate_tree_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        summary:
          type: object
          additionalProperties: false
          required: [added, removed, changed, unchanged]
          properties:
            added: { type: integer, minimum: 0 }
            removed: { type: integer, minimum: 0 }
            changed: { type: integer, minimum: 0 }
            unchanged: { type: integer, minimum: 0 }
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileComparison'
    EvaluationRunRequest:
      type: object
      additionalProperties: false
      required: [adapter, cases, samples, timeout_seconds]
      properties:
        adapter:
          enum: [fake, codex, claude]
        cases:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: string, minLength: 1 }
        samples:
          type: integer
          minimum: 1
        timeout_seconds:
          type: integer
          minimum: 1
        resume:
          type: boolean
          default: false
          description: Continue from an exact existing checkpoint instead of replacing it.
        retry_nonpassing:
          type: boolean
          default: false
          description: Re-run only failed or blocked slots in a complete matched checkpoint.
    EvaluationRunResponse:
      type: object
      additionalProperties: false
      required:
        - report_version
        - adapter
        - skill_sha256
        - harness_sha256
        - samples
        - timeout_seconds
        - case_ids
        - requested_results
        - completed_results
        - status
        - results
      properties:
        report_version: { const: 2 }
        adapter: { enum: [fake, codex, claude] }
        skill_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        harness_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
          description: >-
            Digest of the runner, adapters, scorer, and evaluation JSON Schemas used
            to produce every result in this report.
        samples: { type: integer, minimum: 1 }
        timeout_seconds:
          type: integer
          minimum: 1
          description: Total wall-clock budget applied independently to each sample.
        case_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: string, pattern: '^[a-z0-9-]+$' }
          description: Complete ordered case plan repeated for each sample.
        requested_results:
          type: integer
          minimum: 1
          description: Exact number of case/sample executions in the immutable run plan.
        completed_results:
          type: integer
          minimum: 0
          description: Number of atomically checkpointed results currently present.
        status: { enum: [passed, failed, blocked] }
        results:
          type: array
          items:
            $ref: './schemas/eval-result.schema.json'
    EvaluationAggregationRequest:
      type: object
      additionalProperties: false
      required: [codex_report, claude_report]
      properties:
        codex_report: { type: string, minLength: 1 }
        claude_report: { type: string, minLength: 1 }
        minimum_samples: { type: integer, minimum: 2, default: 2 }
    FileComparison:
      type: object
      additionalProperties: false
      required: [path, state]
      properties:
        path:
          type: string
        state:
          enum: [added, removed, changed, unchanged]
        baseline_sha256:
          type: [string, 'null']
          pattern: '^[a-f0-9]{64}$'
        candidate_sha256:
          type: [string, 'null']
          pattern: '^[a-f0-9]{64}$'
    Evidence:
      type: object
      additionalProperties: false
      required: [kind, path]
      properties:
        kind:
          type: string
        path:
          type: string
    ExcludedPath:
      type: object
      additionalProperties: false
      required: [path, reason]
      properties:
        path:
          type: string
        reason:
          enum: [vcs, worktree, dependency, cache, generated, explicit, limit]
    InspectionWarning:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    ValidationFinding:
      type: object
      additionalProperties: false
      required: [path, code, message]
      properties:
        path:
          type: string
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [status, error]
      properties:
        status:
          const: error
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    EvaluationCase:
      $ref: './schemas/eval-case.schema.json'
    EvaluationResult:
      $ref: './schemas/eval-result.schema.json'
    EmpiricalGateManifest:
      $ref: './schemas/empirical-gate.schema.json#/$defs/manifest'
    EmpiricalGateReport:
      $ref: './schemas/empirical-gate.schema.json'
    AcceptanceTraceabilityManifest:
      $ref: './schemas/acceptance-traceability.schema.json#/$defs/manifest'
    AcceptanceTraceabilityReport:
      $ref: './schemas/acceptance-traceability.schema.json'
