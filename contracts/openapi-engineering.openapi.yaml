    UsageCleanupRequest:
      type: object
      additionalProperties: false
      required: [requested_at, scope, apply]
      properties:
        requested_at: { type: string, format: date-time }
        scope: { enum: [local, remote], default: local }
        apply: { type: boolean, default: false }
        approval_sha256: { type: [string, 'null'], pattern: '^[a-f0-9]{64}$' }
    MaintenanceAnalysisRequest:
      type: object
      additionalProperties: false
      required: [findings, sanitized_events]
      properties:
        findings:
          type: array
          minItems: 1
          items:
            $ref: './schemas/maintenance-finding.schema.json'
        sanitized_events:
          type: array
          maxItems: 50
          items:
            $ref: './schemas/usage-event.schema.json#/$defs/sanitized_event'
        credential_mode:
          enum: [environment, active-cli-session]
          default: environment
        resume_analysis:
          oneOf:
            - $ref: './schemas/maintenance-analysis.schema.json'
            - type: 'null'
          default: null
        timeout_seconds: { type: integer, minimum: 1, maximum: 600, default: 600 }
        warning_rss_mb: { type: integer, minimum: 1, default: 512 }
        hard_rss_mb: { type: integer, minimum: 2, default: 1024 }
    MaintenanceAutomationRequest:
      type: object
      additionalProperties: false
      required: [action, apply]
      properties:
        action: { enum: [status, configure, disable] }
        credential_mode:
          type: [string, 'null']
          enum: [active-cli-session, null]
          default: null
        python_executable:
          type: [string, 'null']
          minLength: 1
          maxLength: 4096
          default: null
        notification: { enum: [none, macos], default: none }
        approval_sha256: { type: [string, 'null'], pattern: '^[a-f0-9]{64}$' }
        apply: { type: boolean, default: false }
      allOf:
        - if:
            properties:
              action: { const: configure }
          then:
            required: [credential_mode, python_executable]
            properties:
              credential_mode: { const: active-cli-session }
              python_executable: { type: string }
    MaintenanceAutomationResult:
      type: object
      additionalProperties: false
      required: [status, action, applied, approval_sha256, config]
      properties:
        status: { enum: [ok, stale] }
        action: { enum: [status, configure, disable] }
        applied: { type: boolean }
        approval_sha256: { type: [string, 'null'], pattern: '^[a-f0-9]{64}$' }
        config:
          $ref: './schemas/usage-config.schema.json'
    MaintenanceCycleRequest:
      type: object
      additionalProperties: false
      required: [requested_at]
      properties:
        requested_at: { type: string, format: date-time }
    MaintenancePromotionRequest:
      type: object
      additionalProperties: false
      required: [proposal, approval_sha256, apply]
      properties:
        proposal:
          $ref: './schemas/maintenance-proposal.schema.json'
        approval_sha256: { type: string, pattern: '^[a-f0-9]{64}$' }
        apply: { type: boolean, default: false }
    MaintenancePromotionResult:
      $ref: './schemas/maintenance-promotion.schema.json'
