      properties:
        status: { enum: [ok, conflict] }
        action: { enum: [status, install, uninstall] }
        applied: { type: boolean }
        state: { enum: [missing, would-install, installed, would-remove, removed, conflict] }
        target: { type: string, minLength: 1 }
        sha256: { type: [string, 'null'], pattern: '^[a-f0-9]{64}$' }
    UsageSessionRequest:
      type: object
      additionalProperties: false
      required: [agent, project_alias, argv]
      properties:
        agent: { enum: [codex, claude] }
        project_alias: { type: string, minLength: 1, maxLength: 80 }
        argv:
