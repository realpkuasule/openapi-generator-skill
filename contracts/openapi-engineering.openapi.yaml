openapi: 3.1.0
info:
  title: OpenAPI Engineering Control Plane
  version: 1.3.0
  description: >-
    Platform-neutral contracts for helpers bundled with the openapi-engineering
    skill. Discovery, comparison, and proposal operations are read-only; the
    profile apply operation is explicitly approval-bound. The implementation is
    CLI based, and future HTTP or MCP adapters must preserve these semantics.
x-runtime: cli-only
x-server-status: no-http-server-ships-with-this-skill
tags:
  - name: Inspection
  - name: Governance
  - name: Generation
  - name: Evaluation
  - name: Usage
  - name: Maintenance
paths:
  /v1/inspections:
    post:
      operationId: inspectProject
      x-cli-command: python3 scripts/inspect_project.py --root <root>
      x-cli-arguments:
        root: --root
      x-cli-exit-codes:
        '0': inspection completed
        '2': invalid root or usage error
      tags: [Inspection]
      summary: Inspect a project without changing it
      description: >-
        Reads project metadata and reports contract, build, CI, generation, and
        governance signals. It performs no writes, network calls, installs, or
        service starts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionRequest'
      responses:
        '200':
          description: Inspection completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionResponse'
              examples:
                projectInspection:
                  externalValue: './examples/inspect-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/profile-validations:
    post:
      operationId: validateGovernanceProfile
      x-cli-command: python3 scripts/validate_profile.py <profile>
      x-cli-arguments:
        profile: positional profile file path; the adapter loads the document before validation
      x-cli-exit-codes:
        '0': profile is valid
        '1': profile is invalid
        '2': usage, dependency, schema, or load error
      tags: [Governance]
      summary: Validate a project governance profile
      description: >-
        Validates structure and safety rules without modifying the profile.
        Exit semantics for the CLI adapter are 0 for valid, 1 for invalid, and
        2 for usage or load errors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileValidationRequest'
      responses:
        '200':
          description: Validation completed; inspect the valid field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileValidationResponse'
              examples:
                invalidProfile:
                  externalValue: './examples/profile-validation-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/profile-state-comparisons:
    post:
      operationId: compareGovernanceProfileState
      x-cli-command: >-
        python3 scripts/profile_state.py <check|propose> --profile <profile>
        --inspection <inspection>
      x-cli-arguments:
        mode: first positional argument; check or propose
        profile: --profile
        inspection: --inspection
      x-cli-exit-codes:
        '0': comparison completed
        '1': profile conflicts with observed project state
        '2': usage, dependency, schema, or load error
      tags: [Governance]
      summary: Compare a governance profile with read-only project evidence
      description: >-
        Reports unchanged, changed, conflict, or unknown state. Propose mode may
        return an approval-bound candidate profile but never writes the project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileStateComparisonRequest'
      responses:
        '200':
          description: Profile comparison completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileStateComparisonResponse'
              examples:
                changedProfile:
                  externalValue: './examples/profile-state-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/profile-state-applications:
    post:
      operationId: applyGovernanceProfileProposal
      x-cli-command: >-
        python3 scripts/profile_state.py apply --profile <profile>
        --proposal <proposal> --approve <approval-digest>
      x-cli-arguments:
        profile: --profile
        proposal: --proposal
        approval_digest: --approve
      x-cli-exit-codes:
        '0': approved proposal applied atomically
        '1': proposal is stale or approval digest does not match
        '2': usage, dependency, schema, or load error
      tags: [Governance]
      summary: Apply an explicitly approved governance profile proposal
      description: >-
        Writes only the requested profile after validating the current profile,
        proposed profile, and exact approval digest. Historical permissions do
        not authorize this operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileStateApplyRequest'
      responses:
        '200':
          description: Approved proposal applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileStateApplyResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/generation-comparisons:
    post:
      operationId: compareGeneration
      x-cli-command: python3 scripts/compare_generation.py <baseline> <candidate>
      x-cli-arguments:
        baseline: first positional directory
        candidate: second positional directory
      x-cli-exit-codes:
        '0': comparison completed
        '2': invalid directory or usage error
      tags: [Generation]
      summary: Compare two generated output directories
      description: >-
        Computes stable path and SHA-256 differences. It never runs a generator
        and never writes either directory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerationComparisonRequest'
      responses:
        '200':
          description: Comparison completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationComparisonResponse'
              examples:
                generationDiff:
                  externalValue: './examples/generation-comparison-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/empirical-gates:
    post:
      operationId: runEmpiricalGeneratorGate
      x-cli-command: >-
        python3 scripts/run_empirical_gate.py --manifest <path> [--execute
        --approve <manifest-sha256>] [--report <path>]
      x-cli-arguments:
        manifest: --manifest; approved declarative manifest
        execute: --execute; omitted for the default proposed-only plan
        approval_digest: --approve; exact canonical manifest SHA-256
        report: --report; optional atomic report destination
      x-cli-exit-codes:
        '0': dry-run proposal emitted or every required empirical gate passed
        '1': a required command, diff, integrity, compile, or fixture gate failed
        '2': manifest, approval, digest, or execution prerequisite was blocked
      tags: [Generation]
      summary: Plan or run an approval-bound empirical generator gate
      description: >-
        Validates a declaration that pins the contract, baseline, generator
        artifact, version, commands, feature gaps, and official sources. The
        default is read-only planning. Execution requires the exact manifest
        digest, uses argv without a shell, generates only in a fresh temporary
        workspace, checks project and baseline integrity after every command,
        and reclaims the workspace before returning.
        Upgrade manifests additionally generate previous and candidate versions
        from the same copied contract, require the previous output to match the
        read-only accepted baseline, and reject every generated diff that lacks
        an exact path/state explanation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/empirical-gate.schema.json#/$defs/manifest'
            examples:
              pythonClientAdoption:
                externalValue: './examples/empirical-gate-request.json'
      responses:
        '200':
          description: Empirical plan or execution completed; inspect status and gates.
          content:
            application/json:
              schema:
                $ref: './schemas/empirical-gate.schema.json'
              examples:
                proposedGate:
                  externalValue: './examples/empirical-gate-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/evaluation-runs:
    post:
      operationId: runSkillEvaluation
      x-cli-command: >-
        python3 scripts/run_skill_evals.py --adapter <adapter> --case <case>
        --samples <samples> --timeout <seconds> --report <path> [--resume]
        [--retry-nonpassing]
      x-cli-arguments:
        adapter: --adapter; fake, codex, or claude
        case: repeatable --case
        samples: --samples
        timeout: --timeout
        report: --report
        resume: --resume; continue only from a digest- and plan-matched checkpoint
        retry-nonpassing: --retry-nonpassing; replace only failed or blocked result slots
      x-cli-exit-codes:
        '0': every requested sample passed semantic and safety gates
        '1': at least one requested sample failed
        '2': a platform, contract, or execution prerequisite was blocked
      tags: [Evaluation]
      summary: Run isolated deterministic or real-platform skill evaluations
      description: >-
        Copies the compact fixture to a temporary project, performs a real
        multi-turn boundary interview for Codex or Claude Code in read-only or
        plan mode, and records transcripts, semantic observations, CLI
        versions, and before/after file hashes. The runner atomically checkpoints
        after every completed sample. Resume is accepted only when adapter,
        evaluation plan, timeout, Skill digest, and harness digest still match.
        Eval expected values are never sent to the tested platform.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRunRequest'
      responses:
        '200':
          description: Evaluation samples completed; inspect each result status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRunResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/acceptance-traceability-checks:
    post:
      operationId: checkAcceptanceTraceability
      x-cli-command: >-
        python3 scripts/check_traceability.py --manifest <path> --report <path>
      x-cli-arguments:
        manifest: --manifest; AC-01 through AC-12 evidence bindings
        report: --report; atomic machine-verifiable result
      x-cli-exit-codes:
        '0': all twelve requirements have live passing machine evidence
        '1': one or more requirements are failed, stale, static-only, or incomplete
        '2': the manifest, schema, or a required evidence capability is blocked
      tags: [Governance]
      summary: Verify AC-01 through AC-12 against machine evidence
      description: >-
        Resolves every contract and test selector, validates report status and
        platform coverage, rejects blocked or static-only declarations, and
        produces an embedded Completion Report. Missing or unverified evidence
        can never be counted as passed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/acceptance-traceability.schema.json#/$defs/manifest'
      responses:
        '200':
          description: Traceability check completed; inspect requirement results.
          content:
            application/json:
              schema:
                $ref: './schemas/acceptance-traceability.schema.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/scope-snapshots:
    post:
      operationId: manageScopeSnapshot
      x-cli-command: >-
        python3 scripts/scope_snapshot.py <snapshot|restore> --root <root>
        --snapshot-dir <external-dir> [--path <relative-path>] [--approve <digest>]
      x-cli-arguments:
        operation: first positional argument; snapshot or restore
        root: --root; protected project root
        snapshot_dir: --snapshot-dir; must be outside the project root
        selected_paths: repeatable --path for snapshot
        approval_digest: --approve; exact snapshot manifest digest for restore
      x-cli-exit-codes:
        '0': external snapshot created or exact approved scope restored
        '1': restore approval or current evidence did not match
        '2': request, path, snapshot integrity, or schema prerequisite was blocked
      tags: [Governance]
      summary: Snapshot or restore an explicitly bounded project scope
      description: >-
        Creates a digest-bound baseline outside the project before approved work
        when Git rollback is unavailable. Restore validates every snapshot file
        before changing only the selected relative paths and requires the exact
        approval digest. Symlinks, traversal, and in-project snapshots are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/scope-snapshot.schema.json#/$defs/request'
      responses:
        '200':
          description: Snapshot or restore completed; inspect status and digest.
          content:
            application/json:
              schema:
                $ref: './schemas/scope-snapshot.schema.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/evaluation-report-aggregations:
    post:
      operationId: aggregateSkillEvaluations
      x-cli-command: >-
        python3 scripts/aggregate_forward_evals.py --codex-report <path>
        --claude-report <path> --minimum-samples <minimum_samples>
        --report <path>
      x-cli-arguments:
        codex-report: --codex-report; fresh Codex evaluation report
        claude-report: --claude-report; fresh Claude Code evaluation report
        minimum-samples: --minimum-samples; at least 2, defaults to 2
        report: --report; atomic combined report destination
      x-cli-exit-codes:
        '0': both platforms passed on one Skill digest and are semantically equivalent
        '1': a behavior, safety gate, or semantic strategy comparison failed
        '2': evidence is missing, structurally invalid, stale, or not comparable
      tags: [Evaluation]
      summary: Aggregate and compare fresh Codex and Claude Code evaluations
      description: >-
        Validates every per-sample result, requires at least two samples for each
        required case and platform, verifies identical immutable Skill and evaluation
        harness digests plus file hashes, and compares required boundary-strategy matrices by case while
        retaining primary-ranking differences as evidence. Equivalent reports may rank
        different selected boundaries when both rankings are covered by the same
        accepted matrix. A `language-native` hand-written adapter may refine a shared
        `no-codegen` application decision; every other matrix difference remains a
        failure. This operation only consumes existing reports; it never invokes either
        model platform.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationAggregationRequest'
      responses:
        '200':
          description: Aggregation completed; inspect status and reasons.
          content:
            application/json:
              schema:
                $ref: './schemas/forward-eval-report.schema.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/configuration:
    post:
      operationId: configureUsage
      x-cli-command: >-
        openapi-engineering-skill usage <status|enable|disable|sync-configure>
        [--device <alias>] [--remote <url> --branch <branch>] [--apply]
      x-cli-arguments:
        action: first positional usage action
        device: --device; local non-identifying device alias
        remote: --remote; approved standard Git remote
        branch: --branch; approved branch
        apply: --apply; required for configuration changes, omitted for dry-run
      x-cli-exit-codes:
        '0': status returned, dry-run planned, or approved configuration applied
        '1': requested state conflicts with existing authorization
        '2': invalid or unsafe configuration
      tags: [Usage]
      summary: Inspect or change separately approved local collection and synchronization
      description: >-
        New installations and upgrades remain disabled. Status is read-only. Enable,
        disable, and sync configuration are dry-run by default and require --apply.
        Changing the remote, branch, device alias, state root, or data classification
        invalidates the previous synchronization authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageConfigurationCommand'
      responses:
        '200':
          description: Current or proposed configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageConfigurationResult'
              examples:
                disabledDefaults:
                  externalValue: './examples/usage-status-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/events:
    post:
      operationId: recordUsageEvent
      x-cli-command: >-
        openapi-engineering-skill usage record --completion-report <path>
        --capture-mode <best-effort|launcher> [--launcher-report <path>]
      x-cli-arguments:
        completion_report: --completion-report; structured local completion facts
        capture_mode: --capture-mode
        launcher_report: --launcher-report; required for launcher mode and rejected for best-effort
      x-cli-exit-codes:
        '0': event recorded or collection-disabled no-op reported
        '1': event rejected by privacy or integrity policy
        '2': invalid input or inaccessible configured state
      tags: [Usage]
      summary: Record a local structured usage event after explicit opt-in
      description: >-
        Uses standing local opt-in. It never stores raw dialogue, source, specification
        bodies, stdout/stderr, environment variables, credentials, or full argv. A
        recording failure cannot change the original task outcome.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalUsageEvent'
      responses:
        '200':
          description: Recorded local event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageRecordResult'
              examples:
                bestEffortEvent:
                  externalValue: './examples/usage-record-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/feedback:
    post:
      operationId: recordUsageFeedback
      x-cli-command: >-
        openapi-engineering-skill usage feedback --session <id> --rating <rating>
        [--tag <tag>]
      x-cli-arguments:
        session: --session
        rating: --rating; user-provided, never AI-inferred
        tag: --tag; optional approved friction category
      x-cli-exit-codes:
        '0': feedback recorded or collection-disabled no-op reported
        '1': session is unknown or already has immutable feedback
        '2': invalid rating, tag, or local state
      tags: [Usage]
      summary: Record explicit user feedback separately from AI assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalUserFeedback'
      responses:
        '200':
          description: Recorded feedback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalUserFeedback'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/synchronizations:
    post:
      operationId: synchronizeUsage
      x-cli-command: openapi-engineering-skill usage sync
      x-cli-arguments: {}
      x-cli-exit-codes:
        '0': approved sanitized queue synchronized or no pending data
        '1': remote conflict or untrusted data blocked synchronization
        '2': synchronization is disabled or configuration is invalid
      tags: [Usage]
      summary: Synchronize only schema-validated sanitized objects to an approved Git remote
      description: >-
        Uses standing synchronization opt-in. It disables Git hooks, writes only the
        configured device partition, never stores credentials, and preserves the local
        outbound queue on network, authentication, or non-fast-forward failure.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageSynchronizationRequest'
      responses:
        '200':
          description: Synchronization result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSynchronizationResult'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/summaries:
    post:
      operationId: summarizeUsage
      x-cli-command: openapi-engineering-skill usage summarize --period <iso-week|30d|90d>
      x-cli-arguments:
        period: --period
      x-cli-exit-codes:
        '0': deterministic summary produced
        '1': one or more inputs failed integrity validation
        '2': invalid period or inaccessible state
      tags: [Usage]
      summary: Produce a deterministic summary without invoking a model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageSummaryRequest'
      responses:
        '200':
          description: Deterministic usage summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummary'
              examples:
                weeklySummary:
                  externalValue: './examples/usage-summary-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/due-checks:
    post:
      operationId: checkUsageDue
      x-cli-command: openapi-engineering-skill usage due
      x-cli-arguments: {}
      x-cli-exit-codes:
        '0': no finding or deterministic findings emitted
        '1': input integrity or ownership gate failed
        '2': non-coordinator, disabled, or invalid state
      tags: [Usage]
      summary: Check idempotent weekly thresholds on the M4 coordinator
      description: >-
        Runs at low cost without a model. The same ISO week and input digest can produce
        at most one summary and one analysis eligibility decision.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageDueRequest'
      responses:
        '200':
          description: Deterministic finding when a threshold is met.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageDueResult'
              examples:
                resourceFinding:
                  externalValue: './examples/usage-due-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/maintenance/analyses:
    post:
      operationId: analyzeMaintenanceFindings
      x-cli-command: >-
        openapi-engineering-skill maintenance analyze --findings <path>
        [--credential-mode <environment|active-cli-session>]
        [--resume-analysis <path>]
      x-cli-arguments:
        findings: --findings; sanitized and schema-validated finding bundle only
        credentialMode: >-
          --credential-mode; environment uses approved API-key environment variables and is the
          default, while active-cli-session explicitly uses only the active platform credential
          channel: a staged Codex auth file or the allowlisted authentication/provider fields from
          Claude Code's private user settings
        resumeAnalysis: >-
          --resume-analysis; validated prior analysis with the same input digest and a passed Codex
          primary, a self-consistent analysis ID, and a required blocked/failed secondary review
        timeoutSeconds: --timeout-seconds; 1..600, defaults to 600
        warningRssMb: --rss-warning-mb; defaults to 512
        hardRssMb: --rss-hard-mb; defaults to 1024 and must exceed warningRssMb
      x-cli-exit-codes:
        '0': private analysis produced
        '1': analyzer failed or emitted invalid output
        '2': input, authorization, timeout, or resource gate blocked analysis
      tags: [Maintenance]
      summary: Analyze threshold findings with Codex and optional serial Claude review
      description: >-
        Accepts at most 50 sanitized events. Codex is primary. Claude Code is invoked
        serially only for safety, platform drift, P0/P1, low-confidence, or blocked
        primary results. Neither analyzer may access target projects or local detail. Active CLI
        session reuse is explicit, loads no hooks, plugins, permissions, MCP, history, or projects,
        and removes any staged credential with the analyzer's temporary HOME. A Claude Code
        compatible provider is recorded as the actual configured model and is not represented as
        Anthropic model evidence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceAnalysisRequest'
      responses:
        '200':
          description: Private maintenance analysis.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceAnalysis'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/maintenance/automation:
    post:
      operationId: configureMaintenanceAutomation
      x-cli-command: >-
        openapi-engineering-skill maintenance automation <status|configure|disable>
        [--credential-mode active-cli-session] [--python <absolute-executable>]
        [--notify <none|macos>]
        [--approve <sha256>] [--apply]
      x-cli-arguments:
        action: status, configure, or disable
        credentialMode: configure requires active-cli-session
        pythonExecutable: configure requires a Python 3.11+ absolute path that imports jsonschema
        notification: terminal-report notification policy; macos is coordinator-only
        approvalSha256: exact digest emitted by the unchanged configure dry-run
        apply: omitted for status and dry-run; required with the exact digest to persist configure
      x-cli-exit-codes:
        '0': status returned, dry-run planned, or exact authorized configuration applied
        '1': approval digest or an existing authorization is stale
        '2': invalid coordinator, configuration, credential mode, notification, or unsafe state
      tags: [Maintenance]
      summary: Configure revocable unattended maintenance authorization
      description: >-
        Stores no credential. A configure dry-run qualifies and binds an explicit Python runtime,
        coordinator identity, sync binding, Skill version and digest, analyzer order, resource
        limits, retry limit, and notification policy. Apply requires that exact digest. Any later
        runtime or configuration drift invalidates the authorization.
        Disable is independent and never deletes reports or usage history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceAutomationRequest'
      responses:
        '200':
          description: Current automation state or a dry-run/apply result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceAutomationResult'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/maintenance/cycles:
    post:
      operationId: runMaintenanceCycle
      x-cli-command: >-
        openapi-engineering-skill maintenance cycle [--now <timestamp>]
        [--adapter <codex|fake>] [--fake-response <path>]
        [--secondary-adapter <claude|fake|none>] [--secondary-fake-response <path>] [--json]
      x-cli-arguments:
        requestedAt: --now; optional deterministic clock override
        adapter: --adapter; codex in production, fake only for deterministic offline validation
        fakeResponse: --fake-response; deterministic primary semantic-result fixture
        secondaryAdapter: --secondary-adapter; claude in production, fake/none only for validation
        secondaryFakeResponse: --secondary-fake-response; deterministic secondary fixture
      x-cli-exit-codes:
        '0': no finding, duplicate, or completed private analysis
        '1': analyzer failed after producing terminal private evidence
        '2': authorization, sync, input, credential, timeout, or resource gate blocked the cycle
      tags: [Maintenance]
      summary: Run one authorized unattended coordinator maintenance cycle
      description: >-
        Validates the standing authorization, synchronizes the approved private Git partition,
        performs the idempotent weekly due check, and starts Codex only when a deterministic finding
        exists. Risk-required Claude review runs strictly after Codex. The same
        period/input/authorization has at most two serialized attempts and one immutable terminal
        report. A terminal report is written atomically as private JSON and Markdown before a fixed,
        content-free macOS notification is attempted. No proposal or public write occurs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceCycleRequest'
      responses:
        '200':
          description: Cycle result; inspect the private report only when report_id is non-null.
          content:
            application/json:
              schema:
                $ref: './schemas/maintenance-cycle.schema.json'
              examples:
                completedAnalysis:
                  externalValue: './examples/maintenance-cycle-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/schedulers:
    post:
      operationId: configureUsageScheduler
      x-cli-command: >-
        openapi-engineering-skill usage scheduler <status|install|uninstall>
        [--hour <0-23> --minute <0-59>] [--apply]
      x-cli-arguments:
        action: scheduler status, install, or uninstall
        hour: --hour; local daily due-check hour
        minute: --minute; local daily due-check minute
        apply: --apply; omitted for status or dry-run
      x-cli-exit-codes:
        '0': status returned, dry-run planned, or digest-matched change applied
        '1': existing scheduler file is divergent
        '2': non-macOS, non-coordinator, invalid time, or unsafe target
      tags: [Usage]
      summary: Manage the M4 daily maintenance cycle with dry-run-first semantics
      description: >-
        Installs one daily maintenance cycle with RunAtLoad catch-up. The cycle remains a zero-model
        due check unless a valid standing authorization and deterministic finding both exist. It
        manages only the exact digest-matched plist it created and never installs on collector nodes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageSchedulerRequest'
      responses:
        '200':
          description: Scheduler status or change plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSchedulerResult'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/sessions:
    post:
      operationId: runUsageSession
      x-cli-command: >-
        openapi-engineering-skill session run --agent <codex|claude>
        --project-alias <alias> [--output <path>] -- <argv>
      x-cli-arguments:
        agent: --agent; attribution only, command remains explicit argv
        project_alias: --project-alias; used only after a separately approved record step
        output: --output; optional atomic launcher report path
        argv: exact arguments after --; never executed through a shell
      x-cli-exit-codes:
        '0': child completed successfully and launcher report was emitted
        '1': child exited nonzero
        '2': spawn, timeout, RSS limit, unsupported watcher, or isolation gate blocked
      tags: [Usage]
      summary: Run one explicitly requested strict sample in an owned process group
      description: >-
        Monitors only the process group it starts. Records bounded duration, exit, RSS,
        timeout, and reclamation facts without persisting raw argv, stdout, or stderr.
        The launcher never terminates an existing Codex, Claude, browser, or user process.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageSessionRequest'
      responses:
        '200':
          description: Strict launcher evidence.
          content:
            application/json:
              schema:
                $ref: './schemas/usage-event.schema.json#/$defs/launcher_result'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/cleanups:
    post:
      operationId: cleanupUsageRetention
      x-cli-command: >-
        openapi-engineering-skill usage cleanup [--scope <local|remote>]
        [--approve <plan-sha256>] [--apply]
      x-cli-arguments:
        scope: --scope; local state by default, remote requires coordinator sync authorization
        approve: --approve; exact digest emitted by a fresh dry-run plan
        apply: --apply; requires --approve and revalidates every current file digest
      x-cli-exit-codes:
        '0': dry-run plan emitted, no expired data, or exact approved cleanup applied
        '1': plan digest or a target file changed
        '2': invalid cutoff, symlink, unsafe state, or malformed retained data
      tags: [Usage]
      summary: Plan or apply bounded retention cleanup without touching durable objects
      description: >-
        Local event and feedback rows use the configured local retention. Imported
        sanitized aggregate rows and approved private Git event/feedback partitions use
        remote retention. Remote cleanup is a separate scope so local and Git changes
        cannot partially commit together. Summaries, findings, incidents,
        analyses, proposals, promoted objects, holds, outbound data, and authorization
        are outside this operation. Dry-run is read-only; apply requires the exact plan
        digest and atomically rewrites only digest-matched files.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageCleanupRequest'
      responses:
        '200':
          description: Digest-bound cleanup plan or application report.
          content:
            application/json:
              schema:
                $ref: './schemas/retention-plan.schema.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/usage/trends:
    post:
      operationId: analyzeUsageTrends
      x-cli-command: openapi-engineering-skill usage trends
      x-cli-arguments:
        now: --now; deterministic report boundary
        fix_at: --fix-at; optional exact change boundary for before/after comparison
      x-cli-exit-codes:
        '0': deterministic trend report produced, including insufficient evidence
        '1': local or aggregate evidence failed validation
        '2': collection is disabled or the request boundary is invalid
      tags: [Usage]
      summary: Compare deterministic 30/90-day usage windows and detect recurrence
      description: >-
        Uses only validated usage facts. At least five samples in both 30-day windows
        are required before declaring improvement or worsening. AI self-scores never
        count as outcome evidence. Input and device arrival order do not affect the digest.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [now]
              properties:
                now: { type: string, format: date-time }
                fix_at: { type: [string, 'null'], format: date-time }
      responses:
        '200':
          description: Deterministic trend and recurrence report.
          content:
            application/json:
              schema:
                $ref: './schemas/usage-trend.schema.json'
              examples:
                insufficientTrend:
                  externalValue: './examples/usage-trend-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/maintenance/proposals:
    post:
      operationId: buildMaintenanceProposal
      x-cli-command: openapi-engineering-skill maintenance propose --analysis <path>
      x-cli-arguments:
        analysis: --analysis; schema-validated private analysis
      x-cli-exit-codes:
        '0': immutable private proposal produced
        '1': proposal could not bind every input and target hash
        '2': analysis or local integrity gate blocked proposal creation
      tags: [Maintenance]
      summary: Build an immutable private proposal without changing source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceAnalysis'
      responses:
        '200':
          description: Approval-bound private proposal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceProposal'
              examples:
                approvalBoundProposal:
                  externalValue: './examples/maintenance-proposal-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
  /v1/maintenance/promotions:
    post:
      operationId: promoteMaintenanceProposal
      x-cli-command: >-
        openapi-engineering-skill maintenance promote --proposal <path>
        --approve <sha256>
      x-cli-arguments:
        proposal: --proposal
        approval_digest: --approve; exact immutable proposal SHA-256
        target_root: --target-root; explicit repository or approved private workspace root
        apply: --apply; omitted for a zero-write immutable plan
      x-cli-exit-codes:
        '0': approved private evaluation or failing-test skeleton promoted atomically
        '1': digest, input, target hash, or allowed path is stale
        '2': request is invalid or promotion preflight is blocked
      tags: [Maintenance]
      summary: Promote only an exactly approved proposal into approved private paths
      description: >-
        Promotion never edits public source automatically. It requires an exact digest
        binding inputs, contract impact, target file hashes, failing tests, verification,
        resources, artifact bytes, open questions, and rollback; any drift causes zero writes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenancePromotionRequest'
      responses:
        '200':
          description: Exact approved promotion result.
          content:
            application/json:
              schema:
                $ref: './schemas/maintenance-promotion.schema.json'
              examples:
                zeroWritePlan:
                  externalValue: './examples/maintenance-promotion-response.json'
        '400':
          $ref: '#/components/responses/InvalidRequest'
components:
  responses:
    InvalidRequest:
      description: The request could not be loaded or validated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequest:
              externalValue: './examples/error-response.json'
  schemas:
    InspectionRequest:
