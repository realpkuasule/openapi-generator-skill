    InspectionResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - root
        - project_signals
        - languages
        - build_systems
        - contract_files
        - schema_files
        - governance_profiles
        - ci_files
        - generation_signals
        - generated_directories
        - excluded_paths
        - warnings
        - truncated
        - scan_counts
        - evidence
      properties:
        status:
          const: ok
        root:
          type: string
        project_signals:
          type: array
          items: { type: string }
        languages:
          type: array
          items: { type: string }
        build_systems:
          type: array
          items: { type: string }
        contract_files:
          type: array
          items: { type: string }
        schema_files:
          type: array
          items: { type: string }
        governance_profiles:
          type: array
          items: { type: string }
        ci_files:
          type: array
          items: { type: string }
        generation_signals:
          type: array
          items: { type: string }
        generated_directories:
          type: array
          items: { type: string }
        excluded_paths:
          type: array
          items:
            $ref: '#/components/schemas/ExcludedPath'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/InspectionWarning'
        truncated:
          type: boolean
        scan_counts:
          type: object
          additionalProperties: false
          required: [files, directories]
          properties:
            files: { type: integer, minimum: 0 }
            directories: { type: integer, minimum: 0 }
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/Evidence'
    ProfileValidationRequest:
      type: object
      additionalProperties: false
      required: [profile]
      properties:
        profile:
          $ref: './schemas/governance-profile.schema.json'
    ProfileValidationResponse:
      type: object
      additionalProperties: false
      required: [status, valid, errors, warnings]
      properties:
        status:
          const: ok
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFinding'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFinding'
    ProfileStateComparisonRequest:
      type: object
      additionalProperties: false
      required: [mode, profile, inspection]
      properties:
        mode:
          enum: [check, propose]
        profile:
          $ref: './schemas/governance-profile.schema.json'
        inspection:
          $ref: '#/components/schemas/InspectionResponse'
    ProfileStateComparisonResponse:
      type: object
      additionalProperties: false
      required: [status, state, profile_sha256, changes, proposal, warnings]
      properties:
        status:
          const: ok
        state:
          enum: [unchanged, changed, conflict, unknown]
        profile_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        changes:
          type: array
          items:
            $ref: '#/components/schemas/ProfileStateChange'
        proposal:
          oneOf:
            - $ref: '#/components/schemas/ProfileStateProposal'
            - type: 'null'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFinding'
    ProfileStateChange:
      type: object
      additionalProperties: false
      required:
        - path
        - state
        - profile_value
        - observed_value
        - provenance
        - evidence_paths
      properties:
        path:
          type: string
          pattern: '^/'
        state:
          enum: [changed, conflict, unknown]
        profile_value: {}
        observed_value: {}
        provenance:
          enum: [observed, user-decided, inferred]
        evidence_paths:
          type: array
          items: { type: string }
    ProfileStateProposal:
      type: object
      additionalProperties: false
      required:
        - status
        - profile_sha256
        - proposed_profile_sha256
        - approval_digest
        - requires_approval
        - operations
        - proposed_profile
      properties:
        status:
          const: proposed
        profile_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        proposed_profile_sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        approval_digest:
          type: string
          pattern: '^[a-f0-9]{64}$'
        requires_approval:
          const: true
        operations:
          type: array
          items:
            $ref: '#/components/schemas/ProfilePatchOperation'
        proposed_profile:
          $ref: './schemas/governance-profile.schema.json'
    ProfilePatchOperation:
      type: object
      additionalProperties: false
      required: [op, path, value]
      properties:
        op:
          enum: [add, replace, remove]
        path:
          type: string
          pattern: '^/'
        value: {}
    ProfileStateApplyRequest:
      type: object
      additionalProperties: false
      required: [profile_path, proposal, approval_digest]
      properties:
        profile_path:
          type: string
          minLength: 1
        proposal:
